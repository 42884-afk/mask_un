
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #webcam-container {
            margin: 20px auto;
            border: 4px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #eee;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
        }

        .prediction-row {
            background-color: #f9f9f9;
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 8px;
            border-left: 5px solid #2196F3;
            font-size: 15px;
            color: #555;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Teachable Machine Image Model</h1>
    <button type="button" id="start-btn" onclick="init()">เริ่มทำงาน</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    // ⚠️ สำคัญมาก: นำลิงก์ที่แชร์จาก Teachable Machine ของคุณมาวางแทนที่ลิงก์ตัวอย่างข้างล่างนี้
    const URL = "https://teachablemachine.withgoogle.com/models/v90412R-E/";

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval;

    async function init() {
        try {
            // ซ่อนปุ่มกดเมื่อเริ่มทำงานเพื่อป้องกันการกดซ้ำ
            document.getElementById("start-btn").style.display = "none";

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // โหลด model และ metadata จากอินเทอร์เน็ต
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // ตั้งค่ากล้อง webcam
            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip); 
            await webcam.setup(); // ขอสิทธิ์เข้าถึงกล้อง
            await webcam.play();
            
            // รันลูปให้ภาพเคลื่อนไหวลื่นไหลตามปกติ
            window.requestAnimationFrame(loop);

            // แสดงผลกล้องบนจอ
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            // เตรียมพื้นที่แสดงข้อความ
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) {
                const div = document.createElement("div");
                div.className = "prediction-row";
                labelContainer.appendChild(div);
            }

            // สั่งให้ทำนายผล "ทุกๆ 3 วินาที" (3000 มิลลิวินาที)
            predictInterval = setInterval(predict, 3000);
            
            // สั่งทำนายครั้งแรกทันที
            predict();
            
        } catch (error) {
            alert("ไม่สามารถเข้าถึงกล้องหรือโหลดโมเดลได้ กรุณาตรวจสอบสิทธิ์การใช้กล้อง หรือลิงก์โมเดลของคุณ");
            document.getElementById("start-btn").style.display = "inline-block";
            console.error(error);
        }
    }

    async function loop() {
        webcam.update(); // อัปเดตเฟรมภาพกล้องให้เคลื่อนไหวต่อเนื่อง
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        // ประมวลผลจากภาพล่าสุดในกล้อง
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            
            // อัปเดตข้อความผลลัพธ์
            labelContainer.childNodes[i].innerHTML = `<span>${className}</span> <strong>${probability}</strong>`;
        }
    }
</script>

</body>
</html>
