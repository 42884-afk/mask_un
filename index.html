<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Classifier (3s Interval)</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        h3 { margin: 0 0 20px 0; color: #1a1a1a; font-size: 20px; }
        .btn-action {
            background: #007aff;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-action:hover { background: #0066cc; }
        .btn-action:disabled { background: #aeaeae; cursor: not-allowed; }
        
        #video-viewer {
            margin: 20px auto;
            width: 240px;
            height: 240px;
            border-radius: 12px;
            overflow: hidden;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8e8e93;
            font-size: 14px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        #video-viewer canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }
        
        .result-item {
            background: #f8f9fa;
            border-left: 4px solid #007aff;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 500;
        }
        .error-panel {
            color: #ff3b30;
            background: #ffe5e5;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 13px;
            text-align: left;
            display: none;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="app-card">
    <h3>ระบบตรวจจับวัตถุ (ทุก 3 วินาที)</h3>
    <button type="button" id="ctrl-btn" class="btn-action" onclick="startApp()">เปิดใช้งานกล้อง</button>
    
    <div id="video-viewer">กล้องยังไม่พร้อมใช้งาน</div>
    <div id="result-list"></div>
    <div id="err-log" class="error-panel"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/h17gFZRJk/";[cite: 1]
    let aiModel, streamWebcam, resultList, maxLabels;
    let loopId, timerId;

    async function startApp() {
        const btn = document.getElementById("ctrl-btn");
        const errLog = document.getElementById("err-log");
        const viewer = document.getElementById("video-viewer");
        
        errLog.style.display = "none";
        btn.disabled = true;
        btn.innerText = "กำลังเชื่อมต่อโมเดล...";

        try {
            // 1. โหลดไฟล์โมเดล AI[cite: 1]
            aiModel = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");[cite: 1]
            maxLabels = aiModel.getTotalClasses();[cite: 1]

            // 2. เรียกเปิดกล้องเว็บแคม[cite: 1]
            btn.innerText = "กำลังเริ่มต้นกล้อง...";
            streamWebcam = new tmImage.Webcam(240, 240, true); 
            
            await streamWebcam.setup(); // เบราว์เซอร์จะขอสิทธิ์ตรงนี้[cite: 1]
            await streamWebcam.play();[cite: 1]
            
            // 3. แสดงวิดีโอเข้าพื้นที่รับภาพ
            viewer.innerHTML = "";
            viewer.appendChild(streamWebcam.canvas);[cite: 1]
            
            // 4. จัดเตรียมพื้นที่แสดงผลคำทำนาย
            resultList = document.getElementById("result-list");
            resultList.innerHTML = "";
            for (let i = 0; i < maxLabels; i++) {[cite: 1]
                const item = document.createElement("div");
                item.className = "result-item";
                resultList.appendChild(item);[cite: 1]
            }

            // ซ่อนปุ่มเปิดกล้องเมื่อทุกอย่างทำงานเรียบร้อย
            btn.style.display = "none";

            // สั่งรันเฟรมเรตกล้องให้ภาพขยับเคลื่อนไหว
            loopId = window.requestAnimationFrame(renderFrame);
            
            // สั่งทำนายทุกๆ 3 วินาที
            timerId = setInterval(runPrediction, 3000);
            runPrediction(); // สั่งรันครั้งแรกทันที

        } catch (e) {
            console.error(e);
            btn.disabled = false;
            btn.innerText = "ลองใหม่อีกครั้ง";
            errLog.style.display = "block";
            errLog.innerHTML = `<b>เกิดข้อผิดพลาด:</b> ไม่สามารถเข้าถึงกล้องถ่ายรูปได้<br><br><b>วิธีแก้:</b> โปรดเปิดโค้ดนี้ผ่านระบบเว็บเซิร์ฟเวอร์จำลอง (เช่น Live Server ใน VS Code) หรือนำไปทดสอบบนเว็บออนไลน์ที่มี HTTPS เช่น CodePen เท่านั้น การดับเบิ้ลคลิกไฟล์เปิดตรงๆ บนบราวเซอร์ทั่วไปจะติดบล็อคความปลอดภัยด้านการเข้าถึงกล้องครับ`;
        }
    }

    async function renderFrame() {
        streamWebcam.update();[cite: 1]
        loopId = window.requestAnimationFrame(renderFrame);
    }

    async function runPrediction() {
        if (!aiModel || !streamWebcam) return;
        
        const prediction = await aiModel.predict(streamWebcam.canvas);[cite: 1]
        for (let i = 0; i < maxLabels; i++) {[cite: 1]
            const labelName = prediction[i].className;
            const score = (prediction[i].probability * 100).toFixed(0) + "%";
            resultList.childNodes[i].innerHTML = `<span>${labelName}</span> <span>${score}</span>`;
        }
    }
</script>

</body>
</html>
