<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model - Preview Style</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h2 {
            color: #333;
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 5px;
            text-align: left;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        #status-message {
            color: #666;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: left;
            font-style: italic;
        }

        #webcam-container {
            margin: 15px auto;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            width: 240px;
            height: 240px;
            background-color: #f0f0f0;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        #output-container {
            margin-top: 20px;
            text-align: left;
        }

        .output-title {
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* ดีไซน์แถบสไตล์ Teachable Machine */
        .class-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .class-name {
            width: 110px;
            font-size: 12px;
            color: #e65100;
            font-weight: bold;
            line-height: 1.2;
            padding-right: 5px;
            word-break: break-word;
        }

        .bar-container {
            flex-grow: 1;
            background-color: #ffebee;
            height: 24px;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            background-color: #ef6c00;
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        .percentage-text {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Preview</h2>
    <div id="status-message">กำลังเชื่อมต่อโมเดลและเปิดกล้อง...</div>
    
    <div id="webcam-container"></div>
    
    <div id="output-container">
        <div class="output-title">Output</div>
        <div id="label-container"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    
    // เรียกใช้โมเดลจากโฟลเดอร์ใน GitHub ของคุณ[cite: 1]
    const URL = "./my_model/";

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval;

    // ทำงานอัตโนมัติเมื่อเปิดเว็บ
    window.onload = function() {
        init();
    };

    async function init() {
        const statusDiv = document.getElementById("status-message");
        
        try {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // โหลดโมเดล[cite: 1]
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // ตั้งค่ากล้อง[cite: 1]
            const flip = true; 
            webcam = new tmImage.Webcam(240, 240, flip); 
            await webcam.setup(); 
            await webcam.play();
            
            statusDiv.innerText = "กล้องทำงานแล้ว (สแกนวิเคราะห์ผลทุก 3 วินาที)";
            statusDiv.style.color = "#4CAF50";

            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            // สร้างโครงสร้างแถบพลังตามจำนวน Class
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // ล้างข้อมูลเก่า
            
            for (let i = 0; i < maxPredictions; i++) {
                const row = document.createElement("div");
                row.className = "class-row";
                
                row.innerHTML = `
                    <div class="class-name" id="class-name-${i}">Loading...</div>
                    <div class="bar-container">
                        <div class="bar-fill" id="bar-fill-${i}"></div>
                        <div class="percentage-text" id="percent-text-${i}">0%</div>
                    </div>
                `;
                labelContainer.appendChild(row);
            }

            // ตั้งเวลาประมวลผลคำทำนายทุกๆ 3 วินาที (3000 มิลลิวินาที)
            predictInterval = setInterval(predict, 3000);
            predict();

        } catch (error) {
            statusDiv.innerText = "❌ เกิดข้อผิดพลาด: ไม่พบโฟลเดอร์ my_model หรือสิทธิ์การเข้าถึงกล้องถูกปิดอยู่";
            statusDiv.style.color = "#f44336";
            console.error(error);
        }
    }

    async function loop() {
        webcam.update(); 
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        if (!model || !webcam) return;
        
        const prediction = await model.predict(webcam.canvas);
        
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = prediction[i].probability;
            const percentStr = (probability * 100).toFixed(0) + "%";
            
            // อัปเดตชื่อคลาส
            document.getElementById(`class-name-${i}`).innerText = className;
            
            // อัปเดตความยาวแถบพลัง (Progress Bar)
            const barFill = document.getElementById(`bar-fill-${i}`);
            barFill.style.width = percentStr;
            
            // ปรับสีสันของแถบตามสีคลาส Teachable Machine (แถบแรกสีส้มเข้ม แถบสองสีชมพู/ส้มอ่อน)
            if (i === 0) {
                barFill.style.backgroundColor = "#ef6c00"; 
                barFill.parentElement.style.backgroundColor = "#ffebee";
                document.getElementById(`class-name-${i}`).style.color = "#ef6c00";
            } else {
                barFill.style.backgroundColor = "#ff8a65"; 
                barFill.parentElement.style.backgroundColor = "#fbe9e7";
                document.getElementById(`class-name-${i}`).style.color = "#d84315";
            }
            
            // อัปเดตตัวเลขเปอร์เซ็นต์
            document.getElementById(`percent-text-${i}`).innerText = percentStr;
        }
    }
</script>

</body>
</html>
