<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        #status-message {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
            font-style: italic;
        }

        #webcam-container {
            margin: 20px auto;
            border: 4px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #eee;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
        }

        .prediction-row {
            background-color: #f9f9f9;
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 8px;
            border-left: 5px solid #2196F3;
            font-size: 15px;
            color: #555;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Teachable Machine Image Model</h1>
    <div id="status-message">กำลังโหลดโมเดลและเปิดกล้อง...</div>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    
    // ⚠️ นำลิงก์แชร์จากเว็บ Teachable Machine ของคุณมาวางตรงนี้ได้เลยครับ 
    // หากทดสอบใน GitHub แนะนำให้ใช้ลิงก์ URL แบบเต็มขึ้นต้นด้วย https:// เสมอ
    const URL = "https://teachablemachine.withgoogle.com/models/v90412R-E/";

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval;

    // ทำงานอัตโนมัติเมื่อเปิดหน้าเว็บเสร็จ
    window.onload = function() {
        init();
    };

    async function init() {
        const statusDiv = document.getElementById("status-message");
        
        try {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // โหลดโมเดล
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // ตั้งค่าและเปิดใช้งานกล้อง
            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip); 
            await webcam.setup(); // บราวเซอร์จะขอสิทธิ์เข้าถึงกล้องตรงนี้
            await webcam.play();
            
            // เปลี่ยนข้อความสถานะเมื่อโหลดเสร็จ
            statusDiv.innerText = "ระบบกำลังทำงาน (วิเคราะห์ทุก 3 วินาที)";
            statusDiv.style.color = "#4CAF50";

            // รันสตรีมภาพเคลื่อนไหวให้กล้องลื่นไหล
            window.requestAnimationFrame(loop);

            // แสดงหน้าจอกล้อง
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            // เตรียมหน้าจอแสดงผลลัพธ์
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) {
                const div = document.createElement("div");
                div.className = "prediction-row";
                labelContainer.appendChild(div);
            }

            // ตั้งเวลาให้ประมวลผลคำทำนายทุกๆ 3 วินาที (3000 มิลลิวินาที)
            predictInterval = setInterval(predict, 3000);
            
            // สั่งทำนายครั้งแรกทันที
            predict();

        } catch (error) {
            statusDiv.innerText = "เกิดข้อผิดพลาด: ไม่สามารถเข้าถึงกล้อง หรือลิงก์โมเดลไม่ถูกต้อง";
            statusDiv.style.color = "#f44336";
            console.error(error);
        }
    }

    async function loop() {
        webcam.update(); // เฟดภาพในกล้องให้เคลื่อนไหว
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        if (!model || !webcam) return;
        
        // วิเคราะห์ภาพถ่ายจากกล้อง ณ เสี้ยววินาทีนั้น
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            
            labelContainer.childNodes[i].innerHTML = `<span>${className}</span> <strong>${probability}</strong>`;
        }
    }
</script>

</body>
</html>
