<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        #status-message {
            color: #ff9800;
            font-size: 14px;
            margin-bottom: 15px;
            font-style: italic;
        }

        #webcam-container {
            margin: 20px auto;
            border: 4px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #eee;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #webcam-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Teachable Machine Image Model</h1>
    <div id="status-message">กำลังขอสิทธิ์เปิดกล้อง...</div>
    <div id="webcam-container">
        <!-- สร้างแท็ก video มารองรับสตรีมกล้องโดยตรง ไม่ต้องผ่านสคริปต์ซับซ้อน -->
        <video id="webcam" autoplay playsinline muted></video>
    </div>
</div>

<script type="text/javascript">
    window.onload = function() {
        startCamera();
    };

    async function startCamera() {
        const statusDiv = document.getElementById("status-message");
        const video = document.getElementById("webcam");

        try {
            // สั่งเปิดกล้องของอุปกรณ์โดยตรงผ่านคำสั่งพื้นฐานของบราวเซอร์
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 200, height: 200 } 
            });
            
            video.srcObject = stream;
            statusDiv.innerText = "กล้องทำงานสำเร็จแล้ว! (กำลังรอใส่โมเดลวิเคราะห์)";
            statusDiv.style.color = "#4CAF50";

        } catch (error) {
            statusDiv.innerText = "❌ เปิดกล้องไม่สำเร็จ: กรุณากดไอคอนแม่กุญแจหน้า URL เพื่ออนุญาตให้เว็บเข้าถึงกล้อง";
            statusDiv.style.color = "#f44336";
            console.error(error);
        }
    }
</script>

</body>
</html>
