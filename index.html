<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 24px;
        }

        .btn-start {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
            margin-bottom: 20px;
        }

        .btn-start:hover {
            background-color: #27ae60;
        }

        .btn-start:active {
            transform: scale(0.98);
        }

        #webcam-container {
            margin: 20px 0;
            border-radius: 10px;
            overflow: hidden;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            background-color: #eee;
            line-height: 0;
        }

        #webcam-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
            max-width: 250px;
        }

        #label-container {
            margin-top: 15px;
            text-align: left;
        }

        .label-row {
            background-color: #f8f9fa;
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 5px solid #3498db;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            font-weight: 500;
        }

        .error-message {
            color: #e74c3c;
            background-color: #fde8e7;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            text-align: left;
            display: none;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <button class="btn-start" type="button" onclick="init()">เริ่มทำงาน</button>
    
    <div id="webcam-container"></div>
    <div id="label-container"></div>
    <div id="error-container" class="error-message"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/h17gFZRJk/";[cite: 1]

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval;

    async function init() {
        const errorContainer = document.getElementById("error-container");
        errorContainer.style.display = 'none'; // ซ่อนข้อความแจ้งเตือนเก่าก่อน

        try {
            const modelURL = URL + "model.json";[cite: 1]
            const metadataURL = URL + "metadata.json";[cite: 1]

            // 1. โหลดโมเดล AI[cite: 1]
            model = await tmImage.load(modelURL, metadataURL);[cite: 1]
            maxPredictions = model.getTotalClasses();[cite: 1]

            // 2. ตั้งค่าและเปิดกล้อง[cite: 1]
            const flip = true;[cite: 1]
            webcam = new tmImage.Webcam(250, 250, flip);
            
            // รอเปิดกล้อง (ถ้าไม่ได้รับอนุญาตจะหลุดไปที่ข้อความแจ้งเตือนใน catch ข้างล่าง)[cite: 1]
            await webcam.setup();[cite: 1]
            await webcam.play();[cite: 1]
            
            // ซ่อนปุ่มเมื่อกล้องเปิดสำเร็จ
            document.querySelector('.btn-start').style.display = 'none';
            
            window.requestAnimationFrame(loop);

            // 3. แสดงวิดีโอบนหน้าจอ[cite: 1]
            document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 1]
            labelContainer = document.getElementById("label-container");[cite: 1]
            
            for (let i = 0; i < maxPredictions; i++) {[cite: 1]
                const row = document.createElement("div");
                row.className = "label-row";
                labelContainer.appendChild(row);[cite: 1]
            }

            // 4. ตั้งเวลาทำนายทุกๆ 3 วินาที
            predictInterval = setInterval(predict, 3000);
            predict();

        } catch (error) {
            console.error(error);
            // แสดงข้อความเตือนเมื่อเปิดกล้องไม่ได้
            errorContainer.innerHTML = `
                <strong>⚠️ เกิดข้อผิดพลาดในการเปิดกล้อง:</strong><br>
                1. กรุณากด <b>"อนุญาต (Allow)"</b> ให้เว็บเข้าถึงกล้องถ่ายรูป<br>
                2. ตรวจสอบว่าเปิดไฟล์ผ่านระบบความปลอดภัย (เช่น localhost หรือ https://) หรือยัง<br>
                3. ตรวจสอบว่ามีแอปอื่น (เช่น Zoom, Line) เปิดใช้งานกล้องอยู่หรือไม่
            `;
            errorContainer.style.display = 'block';
        }
    }

    async function loop() {
        webcam.update();[cite: 1]
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 1]
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            const className = prediction[i].className;
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            labelContainer.childNodes[i].innerHTML = `<span>${className}</span> <span>${probability}</span>`;
        }
    }
</script>

</body>
</html>
