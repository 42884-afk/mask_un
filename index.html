<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soil Moisture Sensor Detector</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 440px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 22px;
        }

        #status-message {
            color: #ff9800;
            font-size: 14px;
            margin-bottom: 15px;
            font-style: italic;
        }

        /* กล่องแสดงผลชนิดเซนเซอร์ที่ตรวจพบ */
        #result-display {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 2px solid #a5d6a7;
            word-break: break-all;
        }

        #webcam-container {
            margin: 20px auto;
            border: 4px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            width: 220px;
            height: 220px;
            background-color: #eee;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
        }

        .prediction-row {
            background-color: #f9f9f9;
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 8px;
            border-left: 5px solid #4CAF50;
            font-size: 14px;
            color: #555;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Soil Moisture Sensor Detector</h1>
    <div id="status-message">กำลังโหลดโมเดลข้อมูล...</div>
    
    <!-- กล่องโชว์ชนิดเซนเซอร์เด่นๆ -->
    <div id="result-display">ชนิดที่ตรวจพบ: กำลังเริ่มระบบสแกน...</div>
    
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    
    // อ้างอิงโฟลเดอร์โมเดลบน GitHub ของคุณ[cite: 1]
    const URL = "./my_model/";

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval;

    window.onload = function() {
        init();
    };

    async function init() {
        const statusDiv = document.getElementById("status-message");
        
        try {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // โหลดโมเดล[cite: 1]
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // ตั้งค่ากล้อง[cite: 1]
            const flip = true; 
            webcam = new tmImage.Webcam(220, 220, flip); 
            await webcam.setup(); 
            await webcam.play();
            
            statusDiv.innerText = "ระบบวิเคราะห์อัตโนมัติทำงานแล้ว (สแกนทุก 3 วินาที)";
            statusDiv.style.color = "#4CAF50";

            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) {
                const div = document.createElement("div");
                div.className = "prediction-row";
                labelContainer.appendChild(div);
            }

            // สั่งทำนายผลทุกๆ 3 วินาที (3000 มิลลิวินาที)
            predictInterval = setInterval(predict, 3000);
            predict();

        } catch (error) {
            statusDiv.innerText = "❌ เกิดข้อผิดพลาด: ไม่พบไฟล์ในโฟลเดอร์ my_model หรือสิทธิ์กล้องถูกปิด";
            statusDiv.style.color = "#f44336";
            console.error(error);
        }
    }

    async function loop() {
        webcam.update(); 
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        if (!model || !webcam) return;
        
        const prediction = await model.predict(webcam.canvas);
        
        let highestType = "";
        let highestProbability = 0;

        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probabilityValue = prediction[i].probability;
            const probabilityPercent = (probabilityValue * 100).toFixed(0) + "%";
            
            // แสดงลิสต์รายการเปอร์เซ็นต์ด้านล่าง
            labelContainer.childNodes[i].innerHTML = `<span>${className}</span> <strong>${probabilityPercent}</strong>`;

            // ตรวจหาตัวที่มีค่าความแม่นยำมากที่สุด
            if (probabilityValue > highestProbability) {
                highestProbability = probabilityValue;
                highestType = className;
            }
        }

        // นำชื่อชนิดที่ตรวจเจอที่มีความแม่นยำเกิน 50% มาแสดงที่กล่องข้อความด้านบน
        const resultDisplay = document.getElementById("result-display");
        if (highestProbability > 0.5) {
            resultDisplay.innerHTML = `ตรวจพบชนิด: <br><span style="color: #0d47a1; font-size: 20px;">${highestType}</span> (${(highestProbability * 100).toFixed(0)}%)`;
        } else {
            resultDisplay.innerHTML = `ชนิดที่ตรวจพบ: <span style="color: #757575;">กำลังวิเคราะห์วัตถุ...</span>`;
        }
    }
</script>

</body>
</html>
